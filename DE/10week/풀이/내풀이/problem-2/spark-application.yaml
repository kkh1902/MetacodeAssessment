apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: kafka-to-postgres-batch
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "custom-spark:3.5.4"
  imagePullPolicy: Never
  mainApplicationFile: "local:///opt/spark/jobs/consume_kafka_to_postgres_batch.py"
  sparkVersion: "3.5.4"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  sparkConf:
    "spark.kafka.bootstrap.servers": "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
    "spark.sql.shuffle.partitions": "4"
    "spark.streaming.kafka.consumer.poll.ms": "512"
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    javaOptions: "-Dlog4j.logLevel=INFO"
  executor:
    cores: 1
    instances: 2
    memory: "1g"
    memoryOverhead: "512m"
    javaOptions: "-Dlog4j.logLevel=INFO -XX:+PrintGCDetails -XX:+PrintGCDateStamps -XX:+UseContainerSupport"  # Bug 1 수정: container limits 인식
    resources:
      limits:
        memory: "1600Mi"   # Bug 2 수정: 1024Mi(heap) + 512Mi(overhead) + 64Mi(여유) = 1600Mi
        cpu: "1"
      requests:
        memory: "1600Mi"
        cpu: "500m"

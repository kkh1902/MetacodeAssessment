---
# 문제 8: Databricks 성능 최적화
# 총 RAM: ~2GB (Spark는 Databricks 클라우드에서 실행)
# databricks_default 연결 정보는 수강생이 직접 입력
services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  airflow:
    image: apache/airflow:2.8.4
    container_name: airflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "metade2025"
      # Databricks provider 자동 설치
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-databricks"
    volumes:
      - ./dags:/opt/airflow/dags
    command: >-
      bash -c "
        airflow db migrate &&
        airflow users create -u admin -p admin -r Admin -f Admin -l User -e admin@metade.com 2>/dev/null || true &&
        airflow webserver & airflow scheduler"
    deploy:
      resources:
        limits:
          memory: 1536m

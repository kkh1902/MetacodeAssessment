# 문제 1 - Strimzi Kafka Cluster (k3d 배포용)
#
# 전제 조건:
#   1. k3d 클러스터 생성
#      k3d cluster create mycluster \
#        --port "30092:30092@loadbalancer" \
#        --port "30093:30093@loadbalancer" \
#        --port "30094:30094@loadbalancer" \
#        --port "30095:30095@loadbalancer"
#
#   2. Strimzi operator 설치
#      kubectl create namespace kafka
#      kubectl apply -f https://strimzi.io/install/latest?namespace=kafka -n kafka
#      kubectl wait --for=condition=Ready pod -l name=strimzi-cluster-operator -n kafka --timeout=120s
#
# 배포:
#   kubectl apply -f kafka-cluster.yaml -n kafka
#   kubectl wait kafka/kafka-cluster --for=condition=Ready --timeout=300s -n kafka
#
# 토픽 생성 확인:
#   kubectl get kafkatopic -n kafka
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
spec:
  kafka:
    version: 3.6.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: external
        port: 9094
        type: nodeport
        tls: false
        configuration:
          brokers:
            - broker: 0
              nodePort: 30092
            - broker: 1
              nodePort: 30093
            - broker: 2
              nodePort: 30094
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
    storage:
      type: ephemeral
  zookeeper:
    replicas: 3
    storage:
      type: ephemeral
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: user-events
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    segment.bytes: 67108864

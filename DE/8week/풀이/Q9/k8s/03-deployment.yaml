# Q9 — Deployment (nginx + ConfigMap mount)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realestate-nginx
  namespace: realestate-kihoon
  labels:
    student: kihoon
    app: realestate-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realestate-nginx
  template:
    metadata:
      labels:
        student: kihoon
        app: realestate-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: realestate-html

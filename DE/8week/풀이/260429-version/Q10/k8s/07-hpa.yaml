# Q10 — HorizontalPodAutoscaler
# 대상: Q9 의 realestate-nginx Deployment
# 트리거: CPU 평균 사용률 50% 이상
# 스케일: 2 → 5 replicas
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realestate-hpa
  namespace: realestate-kihoon
  labels:
    student: kihoon
    app: realestate-nginx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: realestate-nginx
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

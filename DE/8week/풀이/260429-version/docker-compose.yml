version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.3-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: "boto3 requests pyspark==3.5.1 apache-airflow-providers-apache-spark==4.1.1"
    DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY:-}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-2}
    S3_BUCKET: ${S3_BUCKET:-realstate-meta-s3}
    STUDENT_NAME: ${STUDENT_NAME:-홍길동}
  volumes:
    - ./Q6/dags:/opt/airflow/dags/q6
    - ./Q7/dags:/opt/airflow/dags/q7
    - ./Q8/dags:/opt/airflow/dags/q8
    - ./Q7/scripts:/opt/airflow/scripts/q7
    - ./Q8/scripts:/opt/airflow/scripts/q8
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        airflow connections add 'aws_default' \
          --conn-type 'aws' \
          --conn-extra "{\"aws_access_key_id\": \"$$AWS_ACCESS_KEY_ID\", \"aws_secret_access_key\": \"$$AWS_SECRET_ACCESS_KEY\", \"region_name\": \"ap-northeast-2\"}" || true
        airflow connections add 'postgres_default' \
          --conn-type 'postgres' \
          --conn-host 'postgres' \
          --conn-login 'airflow' \
          --conn-password 'airflow' \
          --conn-port '5432' \
          --conn-schema 'airflow' || true
        airflow variables set target_table 'sample_table' || true
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    ports:
      - "4040:4040"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: bitnamilegacy/spark:3.5
    environment:
      SPARK_MODE: master
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET:-realstate-meta-s3}
    ports:
      - "7077:7077"
      - "8081:8080"
      - "4041:4040"
    volumes:
      - ./Q7/scripts:/opt/spark-apps/q7
      - ./Q8/scripts:/opt/spark-apps/q8

  # spark-master / spark-worker: Q7·Q8에서 활성화. Q6 단계에서는 불필요.
  # bitnami/spark:3.5 이미지가 deprecated 되어, Q7 시작할 때 apache/spark 또는
  # bitnamilegacy/spark 로 교체해서 사용 예정.

volumes:
  postgres-db-volume:
  airflow-logs:

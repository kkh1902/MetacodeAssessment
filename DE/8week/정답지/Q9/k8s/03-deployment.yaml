apiVersion: apps/v1
kind: Deployment
metadata:
  name: realestate-nginx
  namespace: realestate-홍길동
  labels:
    app: realestate-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realestate-nginx
  template:
    metadata:
      labels:
        app: realestate-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: html
          configMap:
            name: realestate-html

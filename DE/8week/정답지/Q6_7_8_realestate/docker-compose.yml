version: "3.8"
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      apache-airflow-providers-amazon
      apache-airflow-providers-apache-spark
      apache-airflow-providers-postgres
      boto3==1.34.131
      requests==2.32.3
  volumes:
    - ./Q6/dags:/opt/airflow/dags/q6
    - ./Q7/dags:/opt/airflow/dags/q7
    - ./Q8/dags:/opt/airflow/dags/q8
    - ./Q7/scripts:/opt/airflow/scripts
    - ./Q8/scripts:/opt/airflow/scripts_q8
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname admin --lastname admin --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: ["8080:8080"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    ports: ["7077:7077", "8081:8080"]

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077

volumes:
  postgres_data:
  airflow_logs:
